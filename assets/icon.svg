<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg" version="1.1">

  <!-- Fond bleu dégradé, carré à coins arrondis -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#00AEEF"/>
    </linearGradient>
    <linearGradient id="finHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" ry="96"
        fill="url(#bgGradient)"/>

  <!-- Palme gauche -->
  <g transform="translate(256,256) rotate(-35)">
    <g transform="translate(-40,-140)">
      <!-- corps de la palme -->
      <path d="M40 40
               C 20 120, 10 200, 20 260
               C 30 300, 60 320, 90 320
               C 120 320, 150 300, 160 260
               C 170 200, 160 120, 140 40
               Z"
            fill="url(#finHighlight)"/>
      <!-- poche de pied -->
      <path d="M60 40
               C 60 20, 90 10, 110 10
               C 130 10, 150 20, 150 40
               C 150 60, 60 60, 60 40 Z"
            fill="#555555"/>
      <!-- stries -->
      <path d="M80 70 L80 280" stroke="#555" stroke-width="4" stroke-linecap="round"/>
      <path d="M100 70 L100 285" stroke="#555" stroke-width="4" stroke-linecap="round"/>
      <path d="M120 70 L120 280" stroke="#555" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Palme droite -->
  <g transform="translate(256,256) rotate(35)">
    <g transform="translate(-40,-140)">
      <path d="M40 40
               C 20 120, 10 200, 20 260
               C 30 300, 60 320, 90 320
               C 120 320, 150 300, 160 260
               C 170 200, 160 120, 140 40
               Z"
            fill="url(#finHighlight)"/>
      <path d="M60 40
               C 60 20, 90 10, 110 10
               C 130 10, 150 20, 150 40
               C 150 60, 60 60, 60 40 Z"
            fill="#555555"/>
      <path d="M80 70 L80 280" stroke="#555" stroke-width="4" stroke-linecap="round"/>
      <path d="M100 70 L100 285" stroke="#555" stroke-width="4" stroke-linecap="round"/>
      <path d="M120 70 L120 280" stroke="#555" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Enveloppe au centre (message) -->
  <g transform="translate(256,270)">
    <!-- bulle de message -->
    <path d="M-110 -60
             H 110
             C 130 -60, 140 -50, 140 -30
             V 40
             C 140 60, 130 70, 110 70
             H 10
             L -10 100
             L -10 70
             H -110
             C -130 70, -140 60, -140 40
             V -30
             C -140 -50, -130 -60, -110 -60 Z"
          fill="#FFFFFF"/>
    <!-- contour léger -->
    <path d="M-110 -60
             H 110
             C 130 -60, 140 -50, 140 -30
             V 40
             C 140 60, 130 70, 110 70
             H 10
             L -10 100
             L -10 70
             H -110
             C -130 70, -140 60, -140 40
             V -30
             C -140 -50, -130 -60, -110 -60 Z"
          fill="none" stroke="#D0D0D0" stroke-width="4"/>

    <!-- enveloppe interne -->
    <rect x="-100" y="-50" width="200" height="80" rx="8" ry="8"
          fill="#FFFFFF" stroke="#00A0E0" stroke-width="4"/>
    <path d="M-100 -50 L0 0 L100 -50"
          fill="none" stroke="#00A0E0" stroke-width="4"/>
    <path d="M-100 30 L-30 -10"
          fill="none" stroke="#00A0E0" stroke-width="4"/>
    <path d="M100 30 L30 -10"
          fill="none" stroke="#00A0E0" stroke-width="4"/>
  </g>

  <!-- Bulles qui remontent et grossissent -->
  <g fill="#E0F7FF">
    <circle cx="256" cy="130" r="14" opacity="0.85"/>
    <circle cx="276" cy="100" r="10" opacity="0.75"/>
    <circle cx="244" cy="80" r="7" opacity="0.65"/>
  </g>

</svg>
